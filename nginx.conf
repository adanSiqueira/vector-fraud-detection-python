# nginx — pure pass-through load balancer
# No business logic here — the rules explicitly forbid it.

worker_processes      1;        # single worker — better than auto under tiny CPU limits
worker_rlimit_nofile  8192;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        off;    # off reduces burstiness and tail latency
}

http {
    # ── Upstream — round-robin (default, no directive needed) ─────────────────
    upstream backend {
        server api1:8000;
        server api2:8000;

        # Reuse TCP connections to API containers — avoids handshake latency
        keepalive         64;
        keepalive_timeout 60s;
        keepalive_requests 10000;
    }

    # ── Performance globals ───────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;         # disable Nagle — critical for low-latency APIs
    keepalive_timeout   30s;
    keepalive_requests  10000;

    # Disable access log — saves CPU on every request
    access_log          off;
    error_log           /var/log/nginx/error.log warn;

    # ── Server ────────────────────────────────────────────────────────────────
    server {
        listen 80;

        location / {
            proxy_pass          http://backend;
            proxy_http_version  1.1;

            # Required for upstream keepalive
            proxy_set_header    Connection        "";
            proxy_set_header    Host              $host;

            # No buffering — return the response the instant the API sends it
            proxy_buffering     off;
            proxy_request_buffering off;

            # Generous timeout — well above the 2001 ms test cutoff
            proxy_read_timeout  5s;
            proxy_send_timeout  5s;
            proxy_connect_timeout 2s;
        }
    }
}