# nginx — pure pass-through load balancer
# 1 worker process — optimal for tiny CPU budget (0.05 CPU)

worker_processes      1;
worker_rlimit_nofile  8192;

events {
    worker_connections  2048;
    use                 epoll;
    multi_accept        off;   # off avoids burst spikes that inflate tail latency
}

http {
    upstream backend {
        server api1:8000;
        server api2:8000;

        # Reuse TCP connections — avoids handshake latency per request
        keepalive         64;
        keepalive_timeout 60s;
        keepalive_requests 10000;
    }

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout   30s;
    keepalive_requests  10000;

    # Disable access log — saves CPU on every request
    access_log  off;
    error_log   /var/log/nginx/error.log warn;

    server {
        listen 80;

        location / {
            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;

            proxy_buffering             off;
            proxy_request_buffering     off;

            proxy_read_timeout      5s;
            proxy_send_timeout      5s;
            proxy_connect_timeout   2s;
        }
    }
}