version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: lb
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "30M"

  api1:
    image: adansiq/rinha2026-python:latest
    container_name: api1
    expose:
      - "8000"
    environment:
      - PORT=8000
      - EF_QUERY=50
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "280M"

  api2:
    image: adansiq/rinha2026-python:latest
    container_name: api2
    expose:
      - "8000"
    environment:
      - PORT=8000
      - NPROBE=10
    depends_on:
      api1:
        condition: service_healthy
    command: ["sh", "-c", "sleep 15 && python -m granian --interface asgi --host 0.0.0.0 --port 8000 --workers 1 --runtime-threads 1 main:app"]
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 75s
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160M"