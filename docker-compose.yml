version: "3.9"

# Resource budget:
#   nginx : 0.05 CPU + 20 MB
#   api1  : 0.475 CPU + 165 MB
#   api2  : 0.475 CPU + 165 MB
#   ──────────────────────────
#   Total : 1.00 CPU + 350 MB  ✅

services:

  nginx:
    image: nginx:1.27-alpine
    container_name: lb
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "20M"

  api1:
    image: adansiq/rinha2026-python:latest
    container_name: api1
    expose:
      - "8000"
    environment:
      - PORT=8000
      - NPROBE=10
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "165M"

  api2:
    image: adansiq/rinha2026-python:latest
    container_name: api2
    expose:
      - "8000"
    environment:
      - PORT=8000
      - NPROBE=10
    depends_on:
      api1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "165M"