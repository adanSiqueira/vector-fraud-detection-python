services:
  nginx:
    image: nginx:1.27-alpine
    container_name: lb
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.05"    # reduced from 0.10 — nginx barely needs CPU here
          memory: "20M"

  api1:
    image: adansiq/rinha2026-python:latest
    container_name: api1
    expose:
      - "8000"
    environment:
      - PORT=8000
      - NPROBE=5          # reduced from 10 — biggest single p99 win
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client,sys; c=http.client.HTTPConnection('localhost',8000,timeout=2); c.request('GET','/ready'); sys.exit(0 if c.getresponse().status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.475"   # gained from nginx reduction
          memory: "165M"

  api2:
    image: adansiq/rinha2026-python:latest
    container_name: api2
    expose:
      - "8000"
    environment:
      - PORT=8000
      - NPROBE=5          # reduced from 10
    depends_on:
      api1:
        condition: service_healthy
    command: ["sh", "-c", "sleep 15 && python -m granian --interface asgi --host 0.0.0.0 --port 8000 --workers 1 --runtime-threads 1 main:app"]
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client,sys; c=http.client.HTTPConnection('localhost',8000,timeout=2); c.request('GET','/ready'); sys.exit(0 if c.getresponse().status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 75s
    deploy:
      resources:
        limits:
          cpus: "0.475"   # gained from nginx reduction
          memory: "165M"